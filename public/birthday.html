<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Mashura - Sync & Style</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Montserrat:wght@200;400;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        @import "tailwindcss";

        :root {
            --gold: #d4af37;
            --dark-wood: #1a0f0a;
            --velvet: #2a0505;
        }

        body {
            background-color: #050505;
            color: #fff;
            overflow-x: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        .font-cinzel { font-family: 'Cinzel', serif; }
        .font-playfair { font-family: 'Playfair Display', serif; }
        .font-vibes { font-family: 'Great Vibes', cursive; }

        /* Door Container */
        #door-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            perspective: 2000px;
            z-index: 100;
            display: flex;
            background: #000;
        }

        .door {
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, #1a0f0a 0%, #2c1a12 100%);
            border: 8px solid #3d2518;
            box-sizing: border-box;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.445, 0.05, 0.55, 0.95);
            display: flex;
            align-items: center;
        }

        .door-left {
            transform-origin: left;
            border-right: 4px solid var(--gold);
            justify-content: flex-end;
        }

        .door-right {
            transform-origin: right;
            border-left: 4px solid var(--gold);
            justify-content: flex-start;
        }

        .door.open-left { transform: rotateY(-110deg); }
        .door.open-right { transform: rotateY(110deg); }

        /* Door Details */
        .door-panel {
            position: absolute;
            width: 70%;
            height: 80%;
            top: 10%;
            left: 15%;
            border: 2px solid rgba(212, 175, 55, 0.15);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .handle {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #f4e1a1, #d4af37, #b8860b);
            border-radius: 50%;
            margin: 0 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            z-index: 10;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .door:hover .handle {
            transform: scale(1.1) translateZ(20px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.9);
        }

        /* Birthday Content */
        #birthday-hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            opacity: 0;
            transition: opacity 1.5s ease 0.5s;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
        }

        .gold-shimmer {
            background: linear-gradient(to right, #d4af37 20%, #f4e1a1 40%, #ffffff 50%, #f4e1a1 60%, #d4af37 80%);
            background-size: 200% auto;
            color: #000;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            display: inline-block;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .mashura-name {
            animation: floatText 3s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        @keyframes floatText {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Glitter Background */
        #glitter-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .glitter-active #glitter-canvas {
            opacity: 1;
        }

        /* Cake Scene */
        .scene-container {
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a0505, #000);
            perspective: 1200px;
        }

        .table {
            width: 400px;
            height: 200px;
            background: #111;
            border-radius: 50%;
            transform: rotateX(70deg);
            box-shadow: 0 50px 100px rgba(0,0,0,0.8), 0 0 50px rgba(212, 175, 55, 0.1);
            position: absolute;
            bottom: 20%;
        }

        /* 3D Cake CSS */
        .cake {
            position: relative;
            width: 200px;
            height: 200px;
            transform-style: preserve-3d;
            animation: float 4s ease-in-out infinite;
            transform: rotateX(-10deg);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotateY(0) rotateX(-10deg); }
            50% { transform: translateY(-15px) rotateY(10deg) rotateX(-10deg); }
        }

        .cake-layer {
            position: absolute;
            width: 100%;
            height: 100px;
            background: linear-gradient(to right, #4a2c2a, #6d413e, #4a2c2a);
            border-radius: 50%;
            bottom: 0;
            transform-style: preserve-3d;
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.6);
        }

        .cake-layer-2 {
            bottom: 40px;
            background: linear-gradient(to right, #6d413e, #8e5a56, #6d413e);
            transform: scale(0.9);
            height: 80px;
        }

        .cake-layer-top {
            bottom: 80px;
            background: linear-gradient(to right, #8e5a56, #a66f6a, #8e5a56);
            transform: scale(0.8);
            height: 60px;
        }

        .cake-icing {
            position: absolute;
            top: 0;
            width: 100%;
            height: 20px;
            background: #f4f4f4;
            border-radius: 50%;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        /* Knife */
        .knife {
            position: absolute;
            right: -100px;
            top: -50px;
            width: 120px;
            height: 30px;
            cursor: pointer;
            z-index: 50;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: left bottom;
        }

        .knife-blade {
            width: 80px;
            height: 15px;
            background: linear-gradient(to bottom, #ddd, #999);
            clip-path: polygon(0 0, 100% 50%, 0 100%);
            position: absolute;
            left: 0;
        }

        .knife-handle {
            width: 40px;
            height: 12px;
            background: #331a00;
            position: absolute;
            left: 80px;
            top: 2px;
            border-radius: 2px;
        }

        .knife:hover {
            transform: translateX(-20px) rotate(-15deg);
        }

        .knife.cutting {
            animation: cutAction 1.5s forwards;
        }

        @keyframes cutAction {
            0% { transform: translate(0, 0) rotate(0); }
            30% { transform: translate(-150px, -50px) rotate(-45deg); }
            60% { transform: translate(-150px, 100px) rotate(15deg); }
            100% { transform: translate(-150px, 150px) rotate(30deg); opacity: 0; }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            z-index: 1000;
            pointer-events: none;
        }

        /* Scroll indicator */
        .scroll-down {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.6;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0) translateX(-50%);}
            40% {transform: translateY(-10px) translateX(-50%);}
            60% {transform: translateY(-5px) translateX(-50%);}
        }
    </style>
</head>
<body>

    <!-- Door Entrance -->
    <div id="door-wrapper" onclick="openDoors()">
        <div id="left-door" class="door door-left">
            <div class="door-panel"></div>
            <div class="handle"></div>
        </div>
        <div id="right-door" class="door door-right">
            <div class="door-panel"></div>
            <div class="handle"></div>
        </div>
        
        <!-- Hint -->
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <p class="text-gold font-cinzel text-sm tracking-[0.5em] animate-pulse">TAP TO ENTER</p>
        </div>
    </div>

    <canvas id="glitter-canvas"></canvas>

    <!-- Birthday Content -->
    <section id="birthday-hero">
        <div class="px-6 relative z-20">
            <p class="font-cinzel text-gold tracking-[0.4em] mb-4 text-xs opacity-60">A VERY SPECIAL DAY</p>
            <h1 class="text-6xl sm:text-8xl font-playfair font-bold mb-6 italic gold-shimmer">Happy Birthday</h1>
            <h2 class="text-5xl sm:text-7xl font-vibes text-white mb-12 mashura-name">Mashura</h2>
            
            <div class="max-w-md mx-auto opacity-70">
                <p class="text-sm tracking-widest leading-relaxed">
                    May your day be as beautiful as your soul, filled with laughter, love, and sweet surprises.
                </p>
            </div>
        </div>

        <div class="scroll-down flex flex-col items-center">
            <p class="text-[8px] font-cinzel tracking-[0.3em] mb-2">SCROLL DOWN</p>
            <div class="w-[1px] h-12 bg-gold"></div>
        </div>
    </section>

    <!-- 3D Cake Scene -->
    <section class="scene-container">
        <div class="absolute top-20 text-center px-4">
            <h3 class="font-cinzel text-gold tracking-[0.3em] text-sm mb-2">TIME FOR A CELEBRATION</h3>
            <p class="text-xs opacity-40">CUT THE CAKE TO START THE MAGIC</p>
        </div>

        <div class="table"></div>

        <div class="cake" id="cake-container">
            <div class="cake-layer cake-layer-top">
                <div class="cake-icing"></div>
            </div>
            <div class="cake-layer cake-layer-2"></div>
            <div class="cake-layer"></div>
            
            <!-- Target Knife -->
            <div class="knife" id="birthday-knife" onclick="cutCake()">
                <div class="knife-blade"></div>
                <div class="knife-handle"></div>
            </div>
        </div>

        <!-- Hidden Message (revealed after cut) -->
        <div id="final-message" class="absolute bottom-10 opacity-0 transition-opacity duration-1000">
            <p class="font-vibes text-3xl text-gold">Make a wish, Mashura!</p>
        </div>
    </section>

    <script>
        const canvas = document.getElementById('glitter-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initGlitter() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 0.5 + 0.2,
                    opacity: Math.random(),
                    change: Math.random() * 0.05
                });
            }
        }

        function animateGlitter() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y -= p.speed;
                if (p.y < 0) p.y = canvas.height;
                p.opacity += p.change;
                if (p.opacity > 1 || p.opacity < 0) p.change *= -1;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(212, 175, 55, ${Math.max(0, p.opacity)})`;
                ctx.fill();
            });
            requestAnimationFrame(animateGlitter);
        }

        function openDoors() {
            document.activeElement.blur();
            document.getElementById('left-door').classList.add('open-left');
            document.getElementById('right-door').classList.add('open-right');
            
            setTimeout(() => {
                document.getElementById('door-wrapper').style.pointerEvents = 'none';
                document.getElementById('birthday-hero').style.opacity = '1';
                document.body.classList.add('glitter-active');
                
                initGlitter();
                animateGlitter();
                
                // Allow scrolling after reveal
                document.body.style.overflow = 'auto';
            }, 500);

            console.log("Welcome to Mashura's Birthday");
        }

        window.addEventListener('resize', () => {
            if (document.body.classList.contains('glitter-active')) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });

        function cutCake() {
            const knife = document.getElementById('birthday-knife');
            if (knife.classList.contains('cutting')) return;

            knife.classList.add('cutting');

            setTimeout(() => {
                triggerConfetti();
                document.getElementById('final-message').style.opacity = '1';
                
                // Split cake visualization if needed
                const layers = document.querySelectorAll('.cake-layer');
                layers.forEach((layer, i) => {
                    layer.style.transition = 'transform 1s ease';
                    layer.style.transform = `translateX(${i % 2 === 0 ? '-10px' : '10px'}) rotateY(${i % 2 === 0 ? '-5deg' : '5deg'}) scale(0.95)`;
                });
            }, 600);
        }

        function triggerConfetti() {
            const colors = ['#d4af37', '#f4e1a1', '#ffffff', '#ff0000', '#ff69b4'];
            for (let i = 0; i < 100; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-10px';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.transform = `rotate(${Math.random() * 360}deg)`;
                
                document.body.appendChild(conf);

                const duration = 2 + Math.random() * 3;
                conf.animate([
                    { transform: `translate3d(0, 0, 0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate3d(${(Math.random() - 0.5) * 200}px, 100vh, 0) rotate(${Math.random() * 1000}deg)`, opacity: 0 }
                ], {
                    duration: duration * 1000,
                    easing: 'cubic-bezier(0, .9, 1, 1)'
                }).onfinish = () => conf.remove();
            }
        }

        // Lock scroll initially
        document.body.style.overflow = 'hidden';
    </script>
</body>
</html>
