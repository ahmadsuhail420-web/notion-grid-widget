<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Mashura - Sync & Style</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Montserrat:wght@200;400;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        @import "tailwindcss";

        :root {
            --gold: #d4af37;
            --dark-wood: #1a0f0a;
            --velvet: #2a0505;
        }

        body {
            background-color: #050505;
            color: #fff;
            overflow-x: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        .font-cinzel { font-family: 'Cinzel', serif; }
        .font-playfair { font-family: 'Playfair Display', serif; }
        .font-vibes { font-family: 'Great Vibes', cursive; }

        /* Door Container */
        #door-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            perspective: 2000px;
            z-index: 100;
            display: flex;
            background: transparent; /* Allow content behind to show through when doors open */
            transition: opacity 1s ease 2s; /* Fade out whole mechanism after reveal */
        }

        /* Black barrier behind doors to hide content before opening */
        .door-backdrop {
            position: absolute;
            inset: 0;
            background: #000;
            z-index: -1;
            transition: opacity 0.8s ease; /* Immediate fade for better UX */
        }

        .door {
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, #1a0f0a 0%, #2c1a12 100%);
            border: 8px solid #3d2518;
            box-sizing: border-box;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.445, 0.05, 0.55, 0.95);
            display: flex;
            align-items: center;
        }

        .door-left {
            transform-origin: left;
            border-right: 4px solid var(--gold);
            justify-content: flex-end;
        }

        .door-right {
            transform-origin: right;
            border-left: 4px solid var(--gold);
            justify-content: flex-start;
        }

        .door.open-left { transform: rotateY(-110deg); }
        .door.open-right { transform: rotateY(110deg); }

        /* Door Details */
        .door-panel {
            position: absolute;
            width: 70%;
            height: 80%;
            top: 10%;
            left: 15%;
            border: 2px solid rgba(212, 175, 55, 0.15);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .handle {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #f4e1a1, #d4af37, #b8860b);
            border-radius: 50%;
            margin: 0 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            z-index: 10;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .door:hover .handle {
            transform: scale(1.1) translateZ(20px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.9);
        }

        /* Birthday Content */
        #birthday-hero {
            position: relative;
            z-index: 20;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            opacity: 0;
            transition: opacity 1s ease;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
        }

        .gold-shimmer {
            background: linear-gradient(to right, #d4af37 20%, #f4e1a1 40%, #ffffff 50%, #f4e1a1 60%, #d4af37 80%);
            background-size: 200% auto;
            color: #000;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            display: inline-block;
            font-weight: 700;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .mashura-name {
            animation: floatText 3s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }

        @keyframes floatText {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Glitter Background */
        #glitter-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transition: opacity 2s ease;
            background: transparent;
        }

        .glitter-active #glitter-canvas {
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- Door Entrance -->
    <div id="door-wrapper" onclick="openDoors()">
        <div class="door-backdrop" id="door-backdrop"></div>
        <div id="left-door" class="door door-left">
            <div class="door-panel"></div>
            <div class="handle"></div>
        </div>
        <div id="right-door" class="door door-right">
            <div class="door-panel"></div>
            <div class="handle"></div>
        </div>
        
        <!-- Hint -->
        <div id="door-hint" class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <p class="text-gold font-cinzel text-sm tracking-[0.5em] animate-pulse">TAP TO ENTER</p>
        </div>
    </div>

    <canvas id="glitter-canvas"></canvas>

    <!-- Birthday Content -->
    <section id="birthday-hero">
        <div class="px-6 relative z-20">
            <p class="font-cinzel text-gold tracking-[0.4em] mb-4 text-xs opacity-60">A VERY SPECIAL DAY</p>
            <h1 class="text-7xl sm:text-9xl font-playfair font-bold mb-6 italic gold-shimmer drop-shadow-2xl">Happy Birthday</h1>
            <h2 class="text-6xl sm:text-8xl font-vibes text-white mb-12 mashura-name">Mashura</h2>
            
            <div class="max-w-md mx-auto opacity-70">
                <p class="text-sm tracking-widest leading-relaxed">
                    May your day be as beautiful as your soul, filled with laughter, love, and sweet surprises.
                </p>
            </div>
        </div>
    </section>

    <script>
        const canvas = document.getElementById('glitter-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initGlitter() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 0.5 + 0.2,
                    opacity: Math.random(),
                    change: Math.random() * 0.05
                });
            }
        }

        function animateGlitter() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y -= p.speed;
                if (p.y < 0) p.y = canvas.height;
                p.opacity += p.change;
                if (p.opacity > 1 || p.opacity < 0) p.change *= -1;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(212, 175, 55, ${Math.max(0, p.opacity)})`;
                ctx.fill();
            });
            requestAnimationFrame(animateGlitter);
        }

        function openDoors() {
            const wrapper = document.getElementById('door-wrapper');
            if (!wrapper || wrapper.classList.contains('is-opening')) return;
            
            wrapper.classList.add('is-opening');
            document.activeElement.blur();
            
            document.getElementById('left-door').classList.add('open-left');
            document.getElementById('right-door').classList.add('open-right');
            document.getElementById('door-backdrop').style.opacity = '0';
            document.getElementById('door-hint').style.opacity = '0';
            
            // Allow clicking through immediately
            wrapper.style.pointerEvents = 'none';

            setTimeout(() => {
                document.getElementById('birthday-hero').style.opacity = '1';
                document.body.classList.add('glitter-active');
                
                initGlitter();
                animateGlitter();
            }, 300);

            // Hide the entire door mechanism so it's not blocking everything
            setTimeout(() => {
                wrapper.style.opacity = '0';
                setTimeout(() => {
                    wrapper.style.display = 'none';
                }, 1000);
            }, 2500);

            console.log("Welcome to Mashura's Birthday");
        }

        window.addEventListener('resize', () => {
            if (document.body.classList.contains('glitter-active')) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });

        // Initial listener
        document.getElementById('door-wrapper').addEventListener('click', openDoors);
        document.getElementById('door-wrapper').addEventListener('touchstart', (e) => {
            e.preventDefault();
            openDoors();
        }, { once: true });
    </script>
</body>
</html>
