<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact • Sync & Style</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root { --bg:#efebe2; --text:#0d0d0d; --muted: rgba(13,13,13,.62); --border: rgba(13,13,13,.12); }
      *{ box-sizing:border-box; }
      body{ margin:0; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); }
      .wrap{ max-width: 900px; margin:0 auto; padding: 48px 20px; }
      h1{ margin:0; font-size: 44px; letter-spacing:-0.04em; }
      .muted{ color: var(--muted); }
      .card{
        margin-top: 18px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: rgba(255,255,255,.55);
        padding: 16px;
      }
      .grid{ display:grid; gap: 12px; margin-top: 12px; }
      .row{ display:flex; gap: 10px; flex-wrap:wrap; align-items:center; }
      .label{ font-size: 12px; color: var(--muted); font-weight: 800; width: 90px; }
      a{ color:inherit; }
      .admin-outline{ outline: 2px solid rgba(90,167,255,.6); outline-offset: 4px; border-radius: 14px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div style="display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap;">
        <div>
          <h1 id="heading">Contact</h1>
          <div class="muted" id="intro">Have a question? Reach out anytime.</div>
        </div>
        <a class="muted" href="index.html">← Back to Home</a>
      </div>

      <div class="card" id="card">
        <div class="grid">
          <div class="row"><div class="label">Email</div> <div id="email"></div></div>
          <div class="row"><div class="label">Phone</div> <div id="phone"></div></div>
          <div class="row"><div class="label">Address</div> <div id="address"></div></div>
          <div class="row"><div class="label">Social</div> <div id="social"></div></div>
        </div>
      </div>
    </div>

    <script>
      const isAdmin = new URLSearchParams(location.search).get("admin") === "1";

      async function loadContact(){
        const res = await fetch("/content/contact.json", { cache: "no-store" });
        if (!res.ok) return { heading: "Contact", intro: "", email: "", phone: "", address: "", social: {} };
        return res.json();
      }

      function sendSelect(target){
        if (!isAdmin) return;
        window.parent.postMessage({ __adminPreview: true, type: "select", page: "contact", target }, location.origin);
      }

      function render(data){
        document.getElementById("heading").textContent = data.heading || "Contact";
        document.getElementById("intro").textContent = data.intro || "";

        document.getElementById("email").textContent = data.email || "";
        document.getElementById("phone").textContent = data.phone || "";
        document.getElementById("address").textContent = data.address || "";

        const social = data.social || {};
        const parts = [];
        if (social.instagram) parts.push("Instagram");
        if (social.tiktok) parts.push("TikTok");
        if (social.youtube) parts.push("YouTube");
        document.getElementById("social").textContent = parts.length ? parts.join(" • ") : "";
      }

      if (isAdmin) {
        document.getElementById("card").addEventListener("click", (e) => {
          e.preventDefault(); e.stopPropagation();
          sendSelect("contact");
          document.getElementById("card").classList.add("admin-outline");
        });
      }

      window.addEventListener("message", (ev) => {
        if (ev.origin !== location.origin) return;
        const d = ev.data || {};
        if (!d.__adminBuilder) return;
        if (d.type === "applyContact") render(d.data || {});
      });

      (async function init(){
        render(await loadContact());
        if (isAdmin) sendSelect("contact");
      })();
    </script>
  </body>
</html>
