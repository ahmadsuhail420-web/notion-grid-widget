<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us • Sync & Style</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root { --bg:#efebe2; --text:#0d0d0d; }
      *{ box-sizing:border-box; }
      body{ margin:0; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); }
      .wrap{ max-width:800px; margin:0 auto; padding:48px 20px; }
      a{ color:inherit; }
      label{ display:block; margin:12px 0 6px; font-weight:600; }
      input, textarea{ width:100%; padding:12px; border-radius:12px; border:1px solid rgba(0,0,0,0.2); background:#fff; }
      textarea{ min-height:140px; resize:vertical; }
      button{ margin-top:14px; padding:12px 16px; border-radius:999px; border:0; background:#0d0d0d; color:#fff; font-weight:700; cursor:pointer; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Contact Us</h1>
      <p>Send us a message.</p>

      <form onsubmit="event.preventDefault(); alert('Form demo only');">
        <label for="name">Name</label>
        <input id="name" name="name" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="msg">Message</label>
        <textarea id="msg" name="msg" required></textarea>

        <button type="submit">Send</button>
      </form>

      <p style="margin-top:18px;"><a href="index.html">← Back to Home</a></p>
    </div>
  </body>
</html>
