<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Invitation (Template 01) - Sync & Style</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import "tailwindcss";
        :root {
            --primary: #9c404d;
            --groom-accent: #2c3e50;
            --bride-accent: #c0392b;
            --bg-cream: #FBFBFB;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-cream); font-size: 14px; }
        h1, h2, h3, .font-serif { font-family: 'Playfair Display', serif; }
        
        .form-section {
            @apply bg-white px-6 pb-6 pt-16 md:px-10 md:pb-10 md:pt-20 rounded-2xl border border-gray-100 shadow-sm mb-16;
        }
        .label {
            @apply block text-[10px] font-bold text-[#9c404d] uppercase tracking-widest mb-3 opacity-60;
            word-spacing: 0.5rem;
        }
        .input {
            @apply w-full px-1 py-2 rounded-none border-b-2 border-gray-300 focus:outline-none focus:border-[#9c404d] transition-all text-sm bg-transparent;
            box-shadow: none;
        }
        .input::placeholder {
            @apply text-gray-300 italic;
        }
        .input-group {
            @apply relative mb-2;
        }
        /* Mobile friendly adjustments */
        @media (max-width: 640px) {
            .form-section { @apply p-4; }
            h1 { @apply text-xl; }
            h2 { @apply text-sm; }
            .label { @apply text-[9px]; }
        }
    </style>
</head>
<body class="min-h-screen text-gray-800">
    <nav class="bg-white border-b border-gray-50 p-4 md:p-6 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="/customer-dashboard" class="text-xl md:text-2xl font-serif font-bold text-[#9c404d] italic">Sync & Style</a>
            <div class="flex items-center space-x-4 md:space-x-6 text-xs md:text-sm">
                <a href="/customer-dashboard" class="text-gray-400 hover:text-[#9c404d]">Dashboard</a>
                <button onclick="handleLogout()" class="text-[#9c404d] font-bold">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-4 md:p-12">
        <div class="flex flex-col md:flex-row md:items-end md:justify-between mb-8 gap-4">
            <div>
                <h1 id="editor-title" class="text-2xl md:text-3xl font-serif font-bold mb-1">Edit Invitation</h1>
                <p class="text-xs md:text-sm text-gray-400">Template 01: Royal Elegance</p>
            </div>
            <div class="flex space-x-2 md:space-x-3">
                <button onclick="previewInvitation()" class="flex-1 md:flex-none px-4 py-2 border border-[#9c404d] text-[#9c404d] font-bold text-xs rounded-lg hover:bg-[#9c404d]/5">Preview</button>
                <button onclick="saveChanges()" id="save-btn" class="flex-1 md:flex-none px-6 py-2 bg-[#9c404d] text-white font-bold text-xs rounded-lg hover:bg-[#7d333e] shadow-md shadow-[#9c404d]/10">Save</button>
            </div>
        </div>

        <form id="invitation-form">
            <!-- Names & Dates -->
            <div class="form-section">
                <h2 class="text-[11px] font-serif font-bold mt-4 mb-10 border-b pb-3 text-gray-400 tracking-[0.3em] uppercase">Core Details</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="p-5 bg-gray-50/50 rounded-xl border border-gray-100 flex items-center gap-4">
                        <label class="label mb-0 shrink-0 whitespace-nowrap">Groom Name:</label>
                        <input type="text" name="groom_name" class="input" placeholder="Enter Groom Name here...">
                    </div>
                    <div class="p-5 bg-gray-50/50 rounded-xl border border-gray-100 flex items-center gap-4">
                        <label class="label mb-0 shrink-0 whitespace-nowrap">Bride Name:</label>
                        <input type="text" name="bride_name" class="input" placeholder="Enter Bride Name here...">
                    </div>
                    <div class="md:col-span-2 px-4">
                        <label class="label">Invitation Title:</label>
                        <input type="text" name="title" class="input" placeholder="e.g. Save The Date">
                    </div>
                </div>
            </div>

            <!-- Event Details -->
            <div class="form-section">
                <h2 class="text-[11px] font-serif font-bold mt-4 mb-10 border-b pb-3 text-gray-400 tracking-[0.3em] uppercase">Event Schedule</h2>
                <div class="space-y-4">
                    <!-- Nikah -->
                    <div class="p-5 bg-gray-50/50 rounded-xl border border-gray-100">
                        <h3 class="text-xs font-bold mb-4 text-[#9c404d] uppercase tracking-widest border-l-2 border-[#9c404d] pl-2">
                             Nikah Ceremony
                        </h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="label">Nikah Date:</label>
                                <input type="date" name="nikah_date" class="input">
                            </div>
                            <div>
                                <label class="label">Nikah Time:</label>
                                <input type="time" name="nikah_time" class="input">
                            </div>
                            <div class="md:col-span-2">
                                <label class="label">Nikah Venue:</label>
                                <input type="text" name="nikah_venue" class="input" placeholder="Venue details">
                            </div>
                        </div>
                    </div>

                    <!-- Reception -->
                    <div class="p-5 bg-gray-50/50 rounded-xl border border-gray-100">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-xs font-bold text-[#9c404d] uppercase tracking-widest border-l-2 border-[#9c404d] pl-2">Reception Party</h3>
                            <label class="flex items-center space-x-2 text-[10px] text-gray-400 cursor-pointer">
                                <input type="checkbox" name="has_reception" onchange="toggleReception(this.checked)" class="accent-[#9c404d]">
                                <span>Include?</span>
                            </label>
                        </div>
                        <div id="reception-fields" class="grid grid-cols-1 md:grid-cols-2 gap-4 opacity-50 pointer-events-none transition-all">
                            <div>
                                <label class="label">Reception Date:</label>
                                <input type="date" name="reception_date" class="input">
                            </div>
                            <div>
                                <label class="label">Reception Time:</label>
                                <input type="time" name="reception_time" class="input">
                            </div>
                            <div class="md:col-span-2">
                                <label class="label">Reception Venue:</label>
                                <input type="text" name="reception_venue" class="input" placeholder="Venue details">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Groom's Family -->
            <div class="form-section border-l-4 border-red-200">
                <h2 class="text-[11px] font-serif font-bold mt-4 mb-10 border-b pb-3 text-red-900! tracking-[0.3em] uppercase">Groom's Family</h2>
                <div class="grid grid-cols-2 gap-8 px-4">
                    <div>
                        <label class="label text-red-800/50!">Father:</label>
                        <input type="text" name="groom_father" class="input">
                    </div>
                    <div>
                        <label class="label text-red-800/50!">Mother:</label>
                        <input type="text" name="groom_mother" class="input">
                    </div>
                    <div>
                        <label class="label text-red-800/50!">Grandpa:</label>
                        <input type="text" name="groom_grandpa" class="input">
                    </div>
                    <div>
                        <label class="label text-red-800/50!">Grandma:</label>
                        <input type="text" name="groom_grandma" class="input">
                    </div>
                </div>
            </div>

            <!-- Bride's Family -->
            <div class="form-section border-l-4 border-red-200">
                <h2 class="text-[11px] font-serif font-bold mt-4 mb-10 border-b pb-3 text-red-900! tracking-[0.3em] uppercase">Bride's Family</h2>
                <div class="grid grid-cols-2 gap-8 px-4">
                    <div>
                        <label class="label text-red-800/50!">Father:</label>
                        <input type="text" name="bride_father" class="input">
                    </div>
                    <div>
                        <label class="label text-red-800/50!">Mother:</label>
                        <input type="text" name="bride_mother" class="input">
                    </div>
                    <div>
                        <label class="label text-red-800/50!">Grandpa:</label>
                        <input type="text" name="bride_grandpa" class="input">
                    </div>
                    <div>
                        <label class="label text-red-800/50!">Grandma:</label>
                        <input type="text" name="bride_grandma" class="input">
                    </div>
                </div>
            </div>

            <!-- Location -->
            <div class="form-section">
                <h2 class="text-[11px] font-serif font-bold mt-4 mb-10 border-b pb-3 text-gray-400 tracking-[0.3em] uppercase">Maps & Location</h2>
                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="label">City/Place:</label>
                        <input type="text" name="place" class="input" placeholder="e.g. Kannur">
                    </div>
                    <div>
                        <label class="label">Google Maps Link:</label>
                        <input type="url" name="map_url" class="input" placeholder="Paste link here">
                    </div>
                </div>
            </div>

            <!-- Contact Details -->
            <div class="form-section">
                <h2 class="text-[11px] font-serif font-bold mt-4 mb-10 border-b pb-3 text-gray-400 tracking-[0.3em] uppercase text-center">Contact Details</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                    <!-- Groom Side -->
                    <div>
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-[10px] font-bold text-red-900 tracking-widest uppercase">Groom Side</h3>
                            <button type="button" onclick="addContact('groom')" class="text-[9px] font-bold text-[#9c404d] hover:underline uppercase">+ Add</button>
                        </div>
                        <div id="groom-contact-list" class="space-y-4"></div>
                    </div>

                    <!-- Bride Side -->
                    <div>
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-[10px] font-bold text-red-900 tracking-widest uppercase">Bride Side</h3>
                            <button type="button" onclick="addContact('bride')" class="text-[9px] font-bold text-[#9c404d] hover:underline uppercase">+ Add</button>
                        </div>
                        <div id="bride-contact-list" class="space-y-4"></div>
                    </div>
                </div>
            </div>

            <!-- Background Music Selection -->
            <div class="form-section">
                <h2 class="text-[11px] font-serif font-bold mt-4 mb-10 border-b pb-3 text-gray-400 tracking-[0.3em] uppercase">Background Music</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="label">Select Preset Track</label>
                        <select name="bg_music_preset" class="input" onchange="handleMusicSourceChange(this.value)">
                            <option value="https://cdn.pixabay.com/audio/2022/03/10/audio_4421f2bd84.mp3">Royal Instrumental (Violin)</option>
                            <option value="https://cdn.pixabay.com/audio/2022/01/18/audio_2d0ccf0848.mp3">Dreamy Piano & Strings</option>
                            <option value="https://cdn.pixabay.com/audio/2021/11/25/audio_91b32e02f9.mp3">Elegant Acoustic Guitar</option>
                            <option value="custom">Upload Custom Music / Link</option>
                            <option value="none">No Music</option>
                        </select>
                    </div>
                    <div id="custom-music-input" class="hidden">
                        <label class="label">Upload Audio File (.mp3)</label>
                        <input type="file" id="music-upload-btn" accept="audio/*" class="input border-dashed" onchange="handleFileUpload(this)">
                        <p id="upload-status" class="text-[9px] mt-2 text-gray-400"></p>
                        <input type="hidden" name="bg_music_custom" id="bg_music_custom">
                    </div>
                </div>
            </div>
            
            <div class="flex justify-center pt-4 pb-20">
                <button type="button" onclick="saveChanges()" class="w-full py-3.5 bg-[#9c404d] text-white font-bold rounded-xl hover:bg-[#7d333e] shadow-lg shadow-[#9c404d]/20 transition-all active:scale-95 text-sm uppercase tracking-widest">
                    Save Invitation
                </button>
            </div>
        </form>
    </main>

    <script>
        let sb;
        let currentUser;
        let invitationId;
        let invitationData;

        async function initSupabase() {
            try {
                const response = await fetch('/api/config');
                const config = await response.json();
                sb = supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
                
                const { data: { session } } = await sb.auth.getSession();
                if (!session) {
                    window.location.href = '/login';
                    return;
                }
                currentUser = session.user;

                // Get ID from URL
                const urlParams = new URLSearchParams(window.location.search);
                invitationId = urlParams.get('id');

                if (!invitationId) {
                    alert('No invitation ID provided.');
                    window.location.href = '/customer-dashboard';
                    return;
                }

                loadInvitationData();
            } catch (err) {
                console.error('Error:', err);
            }
        }

        async function loadInvitationData() {
            const { data, error } = await sb
                .from('customer_invitations')
                .select('*')
                .eq('id', invitationId)
                .single();

            if (error) {
                alert('Could not load invitation');
                return;
            }

            invitationData = data;
            const details = data.wedding_details || {};
            
            const form = document.getElementById('invitation-form');
            form.groom_name.value = details.groom_name || '';
            form.bride_name.value = details.bride_name || '';
            form.title.value = data.title || '';
            form.nikah_date.value = details.nikah_date || '';
            form.nikah_time.value = details.nikah_time || '';
            form.nikah_venue.value = details.nikah_venue || '';
            
            // Music handling
            const savedMusic = details.bg_music || '';
            const presets = ['https://cdn.pixabay.com/audio/2022/03/10/audio_4421f2bd84.mp3', 'https://cdn.pixabay.com/audio/2022/01/18/audio_2d0ccf0848.mp3', 'https://cdn.pixabay.com/audio/2021/11/25/audio_91b32e02f9.mp3', 'none'];
            if (presets.includes(savedMusic)) {
                form.bg_music_preset.value = savedMusic || presets[0];
                handleMusicSourceChange(savedMusic);
            } else if (savedMusic.startsWith('data:') || savedMusic.startsWith('http')) {
                form.bg_music_preset.value = 'custom';
                document.getElementById('bg_music_custom').value = savedMusic;
                document.getElementById('custom-music-input').classList.remove('hidden');
                document.getElementById('upload-status').innerText = "✅ Saved custom music active";
            } else {
                form.bg_music_preset.value = presets[0];
            }
            
            // Family Fields
            form.groom_father.value = details.groom_father || '';
            form.groom_mother.value = details.groom_mother || '';
            form.groom_grandpa.value = details.groom_grandpa || '';
            form.groom_grandma.value = details.groom_grandma || '';
            
            form.bride_father.value = details.bride_father || '';
            form.bride_mother.value = details.bride_mother || '';
            form.bride_grandpa.value = details.bride_grandpa || '';
            form.bride_grandma.value = details.bride_grandma || '';

            form.place.value = details.place || '';
            form.map_url.value = details.map_url || '';

            if (details.has_reception) {
                form.has_reception.checked = true;
                toggleReception(true);
                form.reception_date.value = details.reception_date || '';
                form.reception_time.value = details.reception_time || '';
                form.reception_venue.value = details.reception_venue || '';
            }

            // Load Contacts
            if (details.contacts && details.contacts.length > 0) {
                details.contacts.forEach(contact => {
                    const side = (contact.side === 'bride') ? 'bride' : 'groom';
                    addContact(side, contact);
                });
            } else {
                addContact('groom', { name: '', relation: 'Father', phone: '' });
                addContact('bride', { name: '', relation: 'Father', phone: '' });
            }
        }

        function toggleReception(checked) {
            const fields = document.getElementById('reception-fields');
            if (checked) {
                fields.classList.remove('opacity-50', 'pointer-events-none');
            } else {
                fields.classList.add('opacity-50', 'pointer-events-none');
            }
        }

        function addContact(side, data = { name: '', relation: '', phone: '' }) {
            const container = document.getElementById(side + '-contact-list');
            const colorClass = 'red';
            const div = document.createElement('div');
            div.className = `flex flex-col gap-2 p-3 rounded-xl contact-row border border-${colorClass}-50 bg-${colorClass}-50/20 shadow-sm`;
            div.setAttribute('data-side', side);
            div.innerHTML = `
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" placeholder="Name" value="${data.name || ''}" class="px-1 py-1 text-xs border-b border-red-100 focus:border-red-500 outline-none contact-name bg-transparent">
                    <input type="text" placeholder="Relation" value="${data.relation || ''}" class="px-1 py-1 text-xs border-b border-red-100 focus:border-red-500 outline-none contact-relation bg-transparent">
                </div>
                <div class="flex gap-2 items-center">
                    <input type="tel" placeholder="Phone" value="${data.phone || ''}" class="flex-1 px-1 py-1 text-xs border-b border-red-100 focus:border-red-500 outline-none contact-phone bg-transparent">
                    <button type="button" onclick="this.parentElement.parentElement.remove()" class="text-gray-300 hover:text-red-500 text-sm px-1 italic uppercase font-bold">✕</button>
                </div>
            `;
            container.appendChild(div);
        }

        function handleMusicSourceChange(val) {
            const customInput = document.getElementById('custom-music-input');
            if (val === 'custom') {
                customInput.classList.remove('hidden');
            } else {
                customInput.classList.add('hidden');
            }
        }

        function handleFileUpload(input) {
            const status = document.getElementById('upload-status');
            const file = input.files[0];
            if (!file) return;

            if (file.size > 700 * 1024) { // 700KB limit
                status.innerText = "❌ File too large (max 700KB)";
                status.className = "text-[9px] mt-2 text-red-500 font-bold";
                input.value = '';
                return;
            }

            status.innerText = "⏳ Processing...";
            status.className = "text-[9px] mt-2 text-blue-500 font-bold animate-pulse";

            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('bg_music_custom').value = e.target.result;
                status.innerText = "✅ Ready (Custom file processed)";
                status.className = "text-[9px] mt-2 text-green-600 font-bold";
            };
            reader.onerror = () => {
                status.innerText = "❌ Error reading file";
            };
            reader.readAsDataURL(file);
        }

        async function saveChanges() {
            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.innerText = "Saving...";

            const form = document.getElementById('invitation-form');

            // Determine Music
            let finalMusic = form.bg_music_preset.value;
            if (finalMusic === 'custom') {
                finalMusic = document.getElementById('bg_music_custom').value || 'none';
            }

            // Gather Contacts
            const contacts = [];
            document.querySelectorAll('.contact-row').forEach(row => {
                const name = row.querySelector('.contact-name').value;
                const relation = row.querySelector('.contact-relation').value;
                const phone = row.querySelector('.contact-phone').value;
                const side = row.getAttribute('data-side');
                if (name || relation || phone) contacts.push({ name, relation, phone, side });
            });

            const wedding_details = {
                groom_name: form.groom_name.value,
                bride_name: form.bride_name.value,
                nikah_date: form.nikah_date.value,
                nikah_time: form.nikah_time.value,
                nikah_venue: form.nikah_venue.value,
                
                groom_father: form.groom_father.value,
                groom_mother: form.groom_mother.value,
                groom_grandpa: form.groom_grandpa.value,
                groom_grandma: form.groom_grandma.value,
                
                bride_father: form.bride_father.value,
                bride_mother: form.bride_mother.value,
                bride_grandpa: form.bride_grandpa.value,
                bride_grandma: form.bride_grandma.value,

                has_reception: form.has_reception.checked,
                reception_date: form.reception_date.value,
                reception_time: form.reception_time.value,
                reception_venue: form.reception_venue.value,
                place: form.place.value,
                map_url: form.map_url.value,
                bg_music: finalMusic,
                contacts: contacts
            };

            const { error } = await sb
                .from('customer_invitations')
                .update({ 
                    title: form.title.value,
                    wedding_details: wedding_details
                })
                .eq('id', invitationId);

            if (error) {
                alert('Error saving: ' + error.message);
            } else {
                alert('Changes saved successfully!');
            }

            saveBtn.disabled = false;
            saveBtn.innerText = "Save Everything";
        }

        function previewInvitation() {
            window.open(`/templates/template01.html?id=${invitationId}`, '_blank');
        }

        async function handleLogout() {
            if (sb) {
                await sb.auth.signOut();
                window.location.href = '/login';
            }
        }

        initSupabase();
    </script>
</body>
</html>
