      <div class="hero-overlay"></div>
      <div class="container hero-content">

    <!-- Slide 3 -->

  <div class="hero-dots" id="heroDots" aria-label="Slide navigation"></div>

<script>
/* Header mobile toggle */
(() => {
  const btn = document.getElementById('navToggle');
  const panel = document.getElementById('mobileNav');
  if (!btn || !panel) return;

  btn.addEventListener('click', () => {
    const open = panel.hidden === false;
    panel.hidden = open;
    btn.setAttribute('aria-expanded', String(!open));
  });
})();
</script>

<script>
/* Sliding hero (autoplay + arrows + dots) */
(() => {
  const track = document.getElementById('heroTrack');
  const prev = document.getElementById('heroPrev');
  const next = document.getElementById('heroNext');
  const dotsRoot = document.getElementById('heroDots');
  if (!track || !prev || !next || !dotsRoot) return;

  const slides = Array.from(track.querySelectorAll('.hero-slide'));
  let index = 0;
  let timer = null;
  const AUTOPLAY_MS = 4500;

  function renderDots() {
    dotsRoot.innerHTML = slides.map((_, i) =>
      `<button class="dot ${i === index ? 'is-active' : ''}" type="button" aria-label="Go to slide ${i+1}" data-i="${i}"></button>`
    ).join('');
    dotsRoot.querySelectorAll('[data-i]').forEach(b => {
      b.addEventListener('click', () => goTo(parseInt(b.getAttribute('data-i'), 10)));
    });
  }

  function goTo(i) {
    index = (i + slides.length) % slides.length;
    track.style.transform = `translateX(-${index * 100}%)`;
    renderDots();
    restart();
  }

  function restart() {
    if (timer) clearInterval(timer);
    timer = setInterval(() => goTo(index + 1), AUTOPLAY_MS);
  }

  prev.addEventListener('click', () => goTo(index - 1));
  next.addEventListener('click', () => goTo(index + 1));

  // Pause on hover (desktop)
  const slider = track.closest('.hero-slider');
  slider.addEventListener('mouseenter', () => timer && clearInterval(timer));
  slider.addEventListener('mouseleave', () => restart());

  // Init
  track.style.transform = 'translateX(0%)';
  renderDots();
  restart();
})();
</script>
