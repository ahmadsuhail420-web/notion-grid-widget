<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sync & Style</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,600;1,700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #efebe2;
        --text: #0d0d0d;
        --muted: rgba(13, 13, 13, 0.62);
        --border: rgba(13, 13, 13, 0.12);
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      a { color: inherit; text-decoration: none; }

      header {
        position: sticky;
        top: 0;
        z-index: 20;
        background: linear-gradient(to bottom, rgba(239, 235, 226, 0.9), rgba(239, 235, 226, 0.55));
        backdrop-filter: blur(10px);
      }

      .nav {
        max-width: 1200px;
        margin: 0 auto;
        padding: 18px 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
      }

      .brand { display: inline-flex; align-items: center; }
      .brand-logo { height: 30px; width: auto; display: block; object-fit: contain; }

      .nav-links {
        display: flex;
        gap: 22px;
        align-items: center;
        font-weight: 500;
        color: rgba(13, 13, 13, 0.78);
      }
      .nav-links a { padding: 8px 10px; border-radius: 10px; }
      .nav-links a:hover { background: rgba(13, 13, 13, 0.06); }

      .nav-cta { display: inline-flex; align-items: center; gap: 14px; }

      /* Icons: NO circle */
      .icon-btn{
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        padding: 0;
        border: 0;
        background: transparent;
        cursor: pointer;
      }
      .icon-btn:hover{ opacity: 0.72; }

      .icon{
        width: 20px;
        height: 20px;
        stroke: rgba(13,13,13,0.9);
      }

      /* Menu button: hidden on desktop, shown only on mobile */
      .menu-btn{
        display: none; /* desktop: hidden */
        width: 28px;
        height: 28px;
        padding: 0;
        border: 0;
        background: transparent;
        cursor: pointer;
      }

      .mobile-drawer {
        display: none;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 64px 18px;
      }
      .mobile-drawer a {
        display: block;
        padding: 12px 10px;
        border-radius: 12px;
        color: rgba(13, 13, 13, 0.84);
        font-weight: 600;
      }
      .mobile-drawer a:hover { background: rgba(13, 13, 13, 0.06); }

      /* ===== Hero ===== */
      .hero-inner {
        max-width: 1200px;
        width: 100%;
        margin: 0 auto;

        display: flex;
        flex-flow: row;
        place-content: center flex-start;
        align-items: center;
        gap: 64px;

        padding: 50px 64px 80px;
        position: relative;
        overflow: hidden;
      }

      .hero-left {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 32px;
        flex: 1 0 0;
        min-width: 0;
      }

    h1{
  margin: 0;
  font-size: 56px;        /* mobile size */
  line-height: 0.90;
  letter-spacing: -0.05em;
  font-weight: 400;       /* not too bold */
}

      @media (min-width: 768px){
  h1{ font-size: 86px; }
}

/* Laptop / Desktop (won't shrink as you resize) */
@media (min-width: 1200px){
  h1{ font-size: 118px; }
}
      
      .italic {
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-weight: 400;
        letter-spacing: -0.02em;
      }

      .subtext {
        max-width: 46ch;
        font-size: 19px;
        line-height: 1.8;
        color: var(--muted);
      }

      .hero-actions { display: flex; gap: 12px; align-items: center; }

      .btn {
        border: 1px solid transparent;
        border-radius: 999px;
        padding: 16px 32px;
        font-weight: 500;
        font-size: 18px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        white-space: nowrap;
      }
      .btn-primary { background: #0d0d0d; color: #fff; }
      .btn-primary:hover { opacity: 0.92; }
      .btn-ghost {
        background: transparent;
        border-color: rgba(13, 13, 13, 0.18);
        color: rgba(13, 13, 13, 0.85);
      }
      .btn-ghost:hover { background: rgba(13, 13, 13, 0.06); }

      /* ticker */
      .ticker {
        width: fit-content;
        max-width: 180px;
        padding: 8px 14px;
        border-radius: 10px;
        background: rgba(13,13,13,0.02);
        overflow: hidden;
      }
      .ticker__track {
        display: inline-flex;
        gap: 28px;
        white-space: nowrap;
        will-change: transform;
        animation: ticker-move 7s linear infinite;
      }
      .ticker__item { font-weight: 600; font-size: 14px; color: rgba(13, 13, 13, 0.85); }
      @keyframes ticker-move { from { transform: translateX(0); } to { transform: translateX(-33.333%); } }
      @media (prefers-reduced-motion: reduce) { .ticker__track { animation: none; } }

      /* story card */
      .hero-right { flex: none; }

      .story-card {
        width: 375px;
        display: flex;
        place-content: center;
        align-items: center;

        position: relative;
        overflow: visible;

        border: 8px solid #fff;
        border-radius: 24px;
        aspect-ratio: 0.56375;
        background: transparent;
      }

      .story-inner {
        width: 100%;
        height: 100%;
        border-radius: 16px;
        overflow: hidden;
        background: #fff;

        position: relative;
        user-select: none;
        box-shadow: 0 2px 16px rgba(0, 0, 0, 0.1);
        cursor: pointer;
      }

      .story-slides { position: absolute; inset: 0; }

      .story-img,
      .story-vid {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;

        opacity: 0;
        transform: translateX(10%);
        transition: opacity 500ms ease, transform 700ms ease;
      }

      .story-img.is-active,
      .story-vid.is-active { opacity: 1; transform: translateX(0); }

      .story-img.is-exiting,
      .story-vid.is-exiting { opacity: 0; transform: translateX(-10%); }

      .story-bars {
        position: absolute;
        top: 10px;
        left: 10px;
        right: 10px;
        display: flex;
        gap: 8px;
        z-index: 2;
      }

      .story-bars .bar {
        height: 3px;
        flex: 1;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.35);
        overflow: hidden;
        position: relative;
      }
      .story-bars .bar::after {
        content: "";
        position: absolute;
        inset: 0;
        width: 0%;
        background: rgba(255, 255, 255, 0.9);
      }
      .story-bars .bar.is-active::after { animation: storyProgress var(--story-duration, 3500ms) linear forwards; }
      .story-bars .bar.is-filled::after { width: 100%; }

      @keyframes storyProgress { from { width: 0%; } to { width: 100%; } }

      .story-zone {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 50%;
        border: 0;
        background: transparent;
        cursor: pointer;
        z-index: 3;
        padding: 0;
      }
      .story-zone.left { left: 0; }
      .story-zone.right { right: 0; }

      .story-zone::after {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-size: 44px;
        line-height: 1;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.85);
        text-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        opacity: 0;
        transition: opacity 160ms ease;
        pointer-events: none;
      }
      .story-zone.left::after { content: "‹"; left: 18px; }
      .story-zone.right::after { content: "›"; right: 18px; }
      .story-inner:hover .story-zone::after { opacity: 1; }
      .story-zone:hover::after { opacity: 1; color: rgba(255, 255, 255, 0.95); }

      /* responsive */
      @media (max-width: 900px) {
        .hero-inner{
    flex-direction: column;
    padding: 36px 20px 40px;
    gap: 28px;
  }

  .hero-right{
    width: 100%;
    display: flex;
    justify-content: center;
  }

  .story-card{
    width: min(360px, 92vw);
    aspect-ratio: 9 / 16;  /* stable */
  }

      /* ✅ Mobile: center ticker + heading + subtext + buttons */
      @media (max-width: 760px) {
        .nav-links { display: none; }

        .menu-btn { display: inline-flex; }

        .nav-cta { gap: 12px; }
        .icon-btn, .menu-btn { width: 24px; height: 24px; }
        .icon { width: 18px; height: 18px; }

        .mobile-drawer { padding: 0 20px 18px; }
        .mobile-drawer[aria-hidden="false"] { display: block; }

  .story-card{
    width: min(320px, 92vw);
    aspect-ratio: 9 / 16;     /* stable on mobile */
  }

  /* optional: give some spacing so it doesn't get squeezed */
  .hero-inner{
    gap: 24px;
  }

  /* make sure it actually shows below the text */
  .hero-right{
    width: 100%;
    display: flex;
    justify-content: center;
  }

        /* center hero text content */
        .hero-left{
          align-items: center;
          text-align: center;
        }

        .subtext{
          max-width: 34ch; /* looks nicer centered on mobile */
        }

        .hero-actions{
          justify-content: center;
          width: 100%;
          flex-wrap: wrap;
        }

        /* center the ticker pill */
        .ticker{
          margin-left: auto;
          margin-right: auto;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <div class="nav">
        <a class="brand" href="index.html" aria-label="Home">
          <img class="brand-logo" src="assets/logo.png" alt="Sync & Style logo" />
        </a>

        <nav class="nav-links" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a href="contact.html">Contact Us</a>
          <a href="about.html">About Us</a>
        </nav>

        <div class="nav-cta" aria-label="Actions">
          <a class="icon-btn" href="shop.html" aria-label="Search (go to shop)">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="M21 21l-4.3-4.3"></path>
            </svg>
          </a>

          <a class="icon-btn" href="account.html" aria-label="Account">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21a8 8 0 0 0-16 0"></path>
              <circle cx="12" cy="8" r="4"></circle>
            </svg>
          </a>

          <a class="icon-btn" href="cart.html" aria-label="Cart">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 6h15l-1.5 9H7.5L6 6Z"></path>
              <path d="M6 6 5 3H2"></path>
              <circle cx="9" cy="20" r="1.5"></circle>
              <circle cx="18" cy="20" r="1.5"></circle>
            </svg>
          </a>

          <button class="menu-btn" id="menuBtn" type="button" aria-expanded="false" aria-controls="mobileDrawer" aria-label="Open menu">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 7h16"></path>
              <path d="M4 12h16"></path>
              <path d="M4 17h16"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="mobile-drawer" id="mobileDrawer" aria-hidden="true">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="contact.html">Contact Us</a>
        <a href="about.html">About Us</a>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="hero-inner">
          <div class="hero-left">
            <div class="ticker" aria-label="Announcement">
              <div class="ticker__track">
                <span class="ticker__item">New drops weekly</span>
                <span class="ticker__item" aria-hidden="true">New drops weekly</span>
                <span class="ticker__item" aria-hidden="true">New drops weekly</span>
              </div>
            </div>

            <h1>
              Short form<br />
              done <span class="italic">right</span>
            </h1>

            <p class="subtext">
              We combine content, management, and paid media to help brands grow and convert on the social platforms that matter most to you.
            </p>

            <div class="hero-actions">
              <a class="btn btn-primary" href="shop.html">Shop now</a>
              <a class="btn btn-ghost" href="contact.html">Contact Us</a>
            </div>
          </div>

          <aside class="hero-right">
            <div class="story-card" aria-label="Story preview">
              <div class="story-inner" id="story">
                <div class="story-slides">
                  <img
                    class="story-img is-active"
                    src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=1400&q=80"
                    alt="Story 1"
                  />

                  <video class="story-vid" muted playsinline preload="metadata">
                    <source src="assets/story2.mp4" type="video/mp4" />
                  </video>

                  <img
                    class="story-img"
                    src="https://images.unsplash.com/photo-1524253482453-3fed8d2fe12b?auto=format&fit=crop&w=1400&q=80"
                    alt="Story 3"
                  />
                </div>

                <div class="story-bars" aria-hidden="true">
                  <span class="bar"></span>
                  <span class="bar"></span>
                  <span class="bar"></span>
                </div>

                <button class="story-zone left" type="button" aria-label="Previous story"></button>
                <button class="story-zone right" type="button" aria-label="Next story"></button>
              </div>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <script>
      // Mobile menu
      const menuBtn = document.getElementById("menuBtn");
      const drawer = document.getElementById("mobileDrawer");

      menuBtn?.addEventListener("click", () => {
        const expanded = menuBtn.getAttribute("aria-expanded") === "true";
        menuBtn.setAttribute("aria-expanded", String(!expanded));
        drawer.setAttribute("aria-hidden", String(expanded));
      });

      // Story slider (images + videos)
      const storyEl = document.getElementById("story");
      const slides = Array.from(storyEl.querySelectorAll(".story-img, .story-vid"));
      const bars = Array.from(storyEl.querySelectorAll(".story-bars .bar"));
      const btnPrev = storyEl.querySelector(".story-zone.left");
      const btnNext = storyEl.querySelector(".story-zone.right");

      const DEFAULT_MS = 3500;
      const MAX_VIDEO_MS = 15000;

      let index = 0;
      let timer = null;

      const isVideo = (el) => el && el.tagName === "VIDEO";

      function setBarDuration(ms) {
        storyEl.style.setProperty("--story-duration", `${ms}ms`);
      }

      function clearTimer() {
        if (timer) clearTimeout(timer);
        timer = null;
      }

      function stopAllVideos() {
        slides.forEach((el) => {
          if (!isVideo(el)) return;
          try {
            el.pause();
            el.currentTime = 0;
          } catch {}
        });
      }

      function getDurationForSlide(el) {
        if (!isVideo(el)) return DEFAULT_MS;
        const d = el.duration;
        if (Number.isFinite(d) && d > 0) return Math.min(Math.round(d * 1000), MAX_VIDEO_MS);
        return DEFAULT_MS;
      }

      function renderBars() {
        bars.forEach((b, i) => {
          b.classList.remove("is-active", "is-filled");
          if (i < index) b.classList.add("is-filled");
          if (i === index) b.classList.add("is-active");
        });
      }

      async function activateVideo(el) {
        if (!isVideo(el)) return;

        if (!el.dataset.storyBound) {
          el.addEventListener("ended", () => {
            showSlide(index + 1);
          });
          el.dataset.storyBound = "1";
        }

        try {
          el.currentTime = 0;
          await el.play();
        } catch {}
      }

      function restartTimerForActiveSlide() {
        clearTimer();
        const active = slides[index];
        const ms = getDurationForSlide(active);
        setBarDuration(ms);
        timer = setTimeout(() => showSlide(index + 1), ms);
      }

      function showSlide(nextIndex) {
        if (nextIndex < 0) nextIndex = slides.length - 1;
        if (nextIndex >= slides.length) nextIndex = 0;

        clearTimer();

        const current = slides[index];
        const next = slides[nextIndex];

        stopAllVideos();

        current.classList.remove("is-active");
        current.classList.add("is-exiting");
        setTimeout(() => current.classList.remove("is-exiting"), 700);

        next.classList.add("is-active");

        index = nextIndex;
        renderBars();

        activateVideo(next);
        restartTimerForActiveSlide();
      }

      // Init
      slides.forEach((s, i) => s.classList.toggle("is-active", i === 0));
      renderBars();
      activateVideo(slides[0]);
      restartTimerForActiveSlide();

      btnPrev?.addEventListener("click", (e) => {
        e.preventDefault();
        showSlide(index - 1);
      });

      btnNext?.addEventListener("click", (e) => {
        e.preventDefault();
        showSlide(index + 1);
      });

      storyEl.addEventListener("mouseenter", () => clearTimer());
      storyEl.addEventListener("mouseleave", () => restartTimerForActiveSlide());
    </script>
  </body>
</html>
