<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sync & Style</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,500;1,600;1,700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #efebe2;
        --text: #0d0d0d;
        --muted: rgba(13, 13, 13, 0.62);
        --border: rgba(13, 13, 13, 0.12);
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      a { color: inherit; text-decoration: none; }

      header {
        position: sticky;
        top: 0;
        z-index: 20;
        background: linear-gradient(to bottom, rgba(239, 235, 226, 0.9), rgba(239, 235, 226, 0.55));
        backdrop-filter: blur(10px);
      }

      .hero-italic{
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .nav {
        max-width: 1200px;
        margin: 0 auto;
        padding: 18px 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
      }

      .brand { display: inline-flex; align-items: center; }
      .brand-logo { height: 30px; width: auto; display: block; object-fit: contain; }

      .nav-links {
        display: flex;
        gap: 22px;
        align-items: center;
        font-weight: 500;
        color: rgba(13, 13, 13, 0.78);
      }
      .nav-links a { padding: 8px 10px; border-radius: 10px; }
      .nav-links a:hover { background: rgba(13, 13, 13, 0.06); }

      .nav-cta { display: inline-flex; align-items: center; gap: 14px; }

      .icon-btn{
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        padding: 0;
        border: 0;
        background: transparent;
        cursor: pointer;
      }
      .icon-btn:hover{ opacity: 0.72; }

      .icon{
        width: 20px;
        height: 20px;
        stroke: rgba(13,13,13,0.9);
      }

      .menu-btn{
        display: none;
        width: 28px;
        height: 28px;
        padding: 0;
        border: 0;
        background: transparent;
        cursor: pointer;
      }

      .mobile-drawer {
        display: none;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 64px 18px;
      }
      .mobile-drawer a {
        display: block;
        padding: 12px 10px;
        border-radius: 12px;
        color: rgba(13, 13, 13, 0.84);
        font-weight: 600;
      }
      .mobile-drawer a:hover { background: rgba(13, 13, 13, 0.06); }

      .hero-inner {
        max-width: 1200px;
        width: 100%;
        margin: 0 auto;

        display: flex;
        flex-flow: row;
        place-content: center flex-start;
        align-items: center;
        gap: 64px;

        padding: 50px 64px 80px;
        position: relative;
        overflow: hidden;
      }

      .hero-left {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 32px;
        flex: 1 0 0;
        min-width: 0;
      }

      h1{
        margin: 0;
        font-size: 56px;
        line-height: 0.90;
        letter-spacing: -0.05em;
        font-weight: 600;
      }
      @media (min-width: 768px){
        h1{ font-size: 86px; }
      }
      @media (min-width: 1200px){
        h1{ font-size: 118px; }
      }

      .subtext {
        max-width: 46ch;
        font-size: 19px;
        line-height: 1.8;
        color: var(--muted);
      }

      .hero-actions { display: flex; gap: 12px; align-items: center; }

      .btn {
        border: 1px solid transparent;
        border-radius: 999px;
        padding: 16px 32px;
        font-weight: 500;
        font-size: 18px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        white-space: nowrap;
      }
      .btn-primary { background: #0d0d0d; color: #fff; }
      .btn-primary:hover { opacity: 0.92; }
      .btn-ghost {
        background: transparent;
        border-color: rgba(13, 13, 13, 0.18);
        color: rgba(13, 13, 13, 0.85);
      }
      .btn-ghost:hover { background: rgba(13, 13, 13, 0.06); }

      .ticker {
        width: fit-content;
        max-width: 180px;
        padding: 8px 14px;
        border-radius: 10px;
        background: rgba(13,13,13,0.02);
        overflow: hidden;
      }
      .ticker__track {
        display: inline-flex;
        gap: 28px;
        white-space: nowrap;
        will-change: transform;
        animation: ticker-move 7s linear infinite;
      }
      .ticker__item { font-weight: 600; font-size: 14px; color: rgba(13, 13, 13, 0.85); }
      @keyframes ticker-move { from { transform: translateX(0); } to { transform: translateX(-33.333%); } }
      @media (prefers-reduced-motion: reduce) { .ticker__track { animation: none; } }

      .hero-right { flex: none; }

      .story-card {
        width: 375px;
        display: flex;
        place-content: center;
        align-items: center;
        position: relative;
        overflow: visible;
        border: 8px solid #fff;
        border-radius: 24px;
        aspect-ratio: 0.56375;
        background: transparent;
      }

      .story-inner {
        width: 100%;
        height: 100%;
        border-radius: 16px;
        overflow: hidden;
        background: #fff;
        position: relative;
        user-select: none;
        box-shadow: 0 2px 16px rgba(0, 0, 0, 0.1);
        cursor: pointer;
      }

      .story-slides { position: absolute; inset: 0; }

      .story-img,
      .story-vid {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform-origin: 50% 50%;
        opacity: 0;
        transform: translateX(10%);
        transition: opacity 500ms ease, transform 700ms ease;
      }

      .story-img.is-active,
      .story-vid.is-active { opacity: 1; transform: translateX(0); }

      .story-img.is-exiting,
      .story-vid.is-exiting { opacity: 0; transform: translateX(-10%); }

      .story-bars {
        position: absolute;
        top: 10px;
        left: 10px;
        right: 10px;
        display: flex;
        gap: 8px;
        z-index: 4;
      }

      .story-bars .bar {
        height: 3px;
        flex: 1;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.35);
        overflow: hidden;
        position: relative;
      }
      .story-bars .bar::after {
        content: "";
        position: absolute;
        inset: 0;
        width: 0%;
        background: rgba(255, 255, 255, 0.9);
      }
      .story-bars .bar.is-active::after { animation: storyProgress var(--story-duration, 3500ms) linear forwards; }
      .story-bars .bar.is-filled::after { width: 100%; }

      @keyframes storyProgress { from { width: 0%; } to { width: 100%; } }

      .story-zone {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 50%;
        border: 0;
        background: transparent;
        cursor: pointer;
        z-index: 5;
        padding: 0;
      }
      .story-zone.left { left: 0; }
      .story-zone.right { right: 0; }

      .story-zone::after {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-size: 44px;
        line-height: 1;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.85);
        text-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        opacity: 0;
        transition: opacity 160ms ease;
        pointer-events: none;
      }
      .story-zone.left::after { content: "‹"; left: 18px; }
      .story-zone.right::after { content: "›"; right: 18px; }
      .story-inner:hover .story-zone::after { opacity: 1; }
      .story-zone:hover::after { opacity: 1; color: rgba(255, 255, 255, 0.95); }

      .story-overlay{
        position:absolute;
        inset: 0;
        pointer-events:none;
        opacity: var(--overlay-opacity, 0.45);
        background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.0) 55%);
        z-index: 2;
      }
      .story-caption{
        position:absolute;
        left: 12px;
        right: 12px;
        bottom: 12px;
        z-index: 3;
        pointer-events:none;
        color: rgba(255,255,255,0.95);
        font-weight: 800;
        font-size: 14px;
        letter-spacing: -0.01em;
        text-shadow: 0 10px 30px rgba(0,0,0,.35);
      }

      @media (max-width: 900px) {
        .hero-inner{ flex-direction: column; padding: 36px 20px 40px; gap: 28px; }
        .hero-right{ width: 100%; display: flex; justify-content: center; }
        .story-card{ width: min(360px, 92vw); aspect-ratio: 9 / 16; }
      }

      @media (max-width: 760px) {
        .nav{ padding: 12px 16px; }
        .brand-logo{ height: 24px; }
        .nav-cta{ gap: 10px; }

        .nav-links { display: none; }
        .menu-btn { display: inline-flex; }

        .icon-btn, .menu-btn { width: 28px; height: 28px; }
        .icon { width: 20px; height: 20px; }

        .mobile-drawer { padding: 0 16px 18px; }
        .mobile-drawer[aria-hidden="false"] { display: block; }

        .story-card{ width: min(320px, 92vw); aspect-ratio: 9 / 16; }
        .hero-inner{ gap: 24px; }
        .hero-right{ width: 100%; display: flex; justify-content: center; }

        .hero-left{ align-items: center; text-align: center; }
        .subtext{ max-width: 34ch; }
        .hero-actions{ justify-content: center; width: 100%; flex-wrap: wrap; }
        .ticker{ margin-left: auto; margin-right: auto; }
      }

      .__adminOutline{
        outline: 2px solid rgba(90,167,255,.6);
        outline-offset: 4px;
        border-radius: 14px;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="nav">
        <a class="brand" href="index.html" aria-label="Home">
          <img class="brand-logo" src="assets/logo.png" alt="Sync & Style logo" />
        </a>

        <nav class="nav-links" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a href="contact.html">Contact Us</a>
          <a href="about.html">About Us</a>
        </nav>

        <div class="nav-cta" aria-label="Actions">
          <a class="icon-btn" href="shop.html" aria-label="Search (go to shop)">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="M21 21l-4.3-4.3"></path>
            </svg>
          </a>

          <a class="icon-btn" href="account.html" aria-label="Account">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21a8 8 0 0 0-16 0"></path>
              <circle cx="12" cy="8" r="4"></circle>
            </svg>
          </a>

          <a class="icon-btn" href="cart.html" aria-label="Cart">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 6h15l-1.5 9H7.5L6 6Z"></path>
              <path d="M6 6 5 3H2"></path>
              <circle cx="9" cy="20" r="1.5"></circle>
              <circle cx="18" cy="20" r="1.5"></circle>
            </svg>
          </a>

          <button class="menu-btn" id="menuBtn" type="button" aria-expanded="false" aria-controls="mobileDrawer" aria-label="Open menu">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 7h16"></path>
              <path d="M4 12h16"></path>
              <path d="M4 17h16"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="mobile-drawer" id="mobileDrawer" aria-hidden="true">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="contact.html">Contact Us</a>
        <a href="about.html">About Us</a>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="hero-inner">
          <div class="hero-left">
            <div class="ticker" aria-label="Announcement">
              <div class="ticker__track" id="tickerTrack">
                <span class="ticker__item" id="tickerText">New drops weekly</span>
                <span class="ticker__item" aria-hidden="true">New drops weekly</span>
                <span class="ticker__item" aria-hidden="true">New drops weekly</span>
              </div>
            </div>

            <h1 id="heroHeading">
              Short form<br />
              done <span class="hero-italic">right</span>
            </h1>

            <p class="subtext" id="heroSubtext">
              We combine content, management, and paid media to help brands grow and convert on the social platforms that matter most to you.
            </p>

            <div class="hero-actions">
              <a class="btn btn-primary" href="shop.html">Shop now</a>
              <a class="btn btn-ghost" href="contact.html">Contact Us</a>
            </div>
          </div>

          <aside class="hero-right">
            <div class="story-card" aria-label="Story preview">
              <div class="story-inner" id="story">
                <div class="story-slides" id="storySlides">
                  <img
                    class="story-img is-active"
                    src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=1400&q=80"
                    alt="Story 1"
                    data-slide-index="0"
                  />

                  <video class="story-vid" muted playsinline preload="metadata" data-slide-index="1">
                    <source src="assets/story2.mp4" type="video/mp4" />
                  </video>

                  <img
                    class="story-img"
                    src="https://images.unsplash.com/photo-1524253482453-3fed8d2fe12b?auto=format&fit=crop&w=1400&q=80"
                    alt="Story 3"
                    data-slide-index="2"
                  />
                </div>

                <div class="story-overlay" id="storyOverlay" hidden></div>
                <div class="story-caption" id="storyCaption" hidden></div>

                <div class="story-bars" aria-hidden="true" id="storyBars">
                  <span class="bar"></span>
                  <span class="bar"></span>
                  <span class="bar"></span>
                </div>

                <button class="story-zone left" type="button" aria-label="Previous story"></button>
                <button class="story-zone right" type="button" aria-label="Next story"></button>
              </div>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <script>
      // Mobile menu
      const menuBtn = document.getElementById("menuBtn");
      const drawer = document.getElementById("mobileDrawer");

      menuBtn?.addEventListener("click", () => {
        const expanded = menuBtn.getAttribute("aria-expanded") === "true";
        menuBtn.setAttribute("aria-expanded", String(!expanded));
        drawer.setAttribute("aria-hidden", String(expanded));
      });

      const isAdmin = new URLSearchParams(location.search).get("admin") === "1";
      const MAX_SLIDES = 5;

      // --- Admin messaging helpers ---
      function adminSend(payload) {
        if (!isAdmin) return;
        window.parent.postMessage({ __adminPreview: true, ...payload }, location.origin);
      }
      function adminClearOutline() {
        document.querySelectorAll(".__adminOutline").forEach((x) => x.classList.remove("__adminOutline"));
      }
      function adminOutline(el) {
        adminClearOutline();
        if (el) el.classList.add("__adminOutline");
      }

      // --- Hero word styling helpers (admin mode) ---
      function normalizeHeroDom() {
        const el = document.getElementById("heroHeading");
        if (!el) return;

        // Convert DIV/P (mobile enter) into <br>
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_ELEMENT, null);
        const blocks = [];
        while (walker.nextNode()) {
          const n = walker.currentNode;
          if (n === el) continue;
          const tag = n.tagName;
          if (tag === "DIV" || tag === "P") blocks.push(n);
        }
        blocks.forEach((b) => {
          const txt = b.textContent || "";
          const br = document.createElement("br");
          b.replaceWith(br, document.createTextNode(txt));
        });

        // Remove spans except hero-italic
        el.querySelectorAll("span").forEach((s) => {
          if (!s.classList.contains("hero-italic")) {
            s.replaceWith(document.createTextNode(s.textContent || ""));
          } else {
            s.className = "hero-italic";
          }
        });

        // Max 2 lines (max 1 <br>)
        const brs = el.querySelectorAll("br");
        if (brs.length > 1) {
          for (let i = 1; i < brs.length; i++) brs[i].remove();
        }

        el.normalize();
      }

      function findWordRangeAroundSelection(rootEl) {
        const sel = window.getSelection();
        if (!sel || sel.rangeCount === 0) return null;

        const range = sel.getRangeAt(0);
        if (!rootEl.contains(range.commonAncestorContainer)) return null;

        let node = sel.focusNode || range.startContainer;
        let offset = sel.focusOffset ?? range.startOffset;

        if (node.nodeType === Node.ELEMENT_NODE) {
          const el = node;
          const child = el.childNodes[Math.min(offset, el.childNodes.length - 1)];
          node = child || el;
          offset = 0;
        }

        if (node.nodeType === Node.ELEMENT_NODE) {
          const tn = node.firstChild;
          if (!tn || tn.nodeType !== Node.TEXT_NODE) return null;
          node = tn;
          offset = Math.min(offset, (tn.nodeValue || "").length);
        }

        if (node.nodeType !== Node.TEXT_NODE) return null;
        const text = node.nodeValue || "";
        if (!text.trim()) return null;

        const isWordChar = (ch) => /[A-Za-z0-9']/u.test(ch);

        let start = Math.max(0, Math.min(offset, text.length));
        let end = start;

        if (start > 0 && start === end && !isWordChar(text[start]) && isWordChar(text[start - 1])) {
          start = start - 1;
          end = start;
        }

        while (start > 0 && isWordChar(text[start - 1])) start--;
        while (end < text.length && isWordChar(text[end])) end++;

        if (start === end) return null;

        const wordRange = document.createRange();
        wordRange.setStart(node, start);
        wordRange.setEnd(node, end);
        return wordRange;
      }

      function wrapRangeWithItalic(wordRange) {
        if (!wordRange) return;

        const commonEl =
          wordRange.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
            ? wordRange.commonAncestorContainer
            : wordRange.commonAncestorContainer.parentElement;

        if (commonEl && commonEl.closest && commonEl.closest("span.hero-italic")) return;

        const span = document.createElement("span");
        span.className = "hero-italic";

        const frag = wordRange.extractContents();
        span.appendChild(frag);
        wordRange.insertNode(span);

        document.getElementById("heroHeading")?.normalize();
      }

      function unwrapItalicAtRange(wordRange) {
        if (!wordRange) return;

        const root = document.getElementById("heroHeading");
        if (!root) return;

        const spans = Array.from(root.querySelectorAll("span.hero-italic"));
        const hit = spans.find((s) => {
          const r = document.createRange();
          r.selectNodeContents(s);
          return !(
            wordRange.compareBoundaryPoints(Range.END_TO_START, r) >= 0 ||
            wordRange.compareBoundaryPoints(Range.START_TO_END, r) <= 0
          );
        });

        if (!hit) return;
        hit.replaceWith(document.createTextNode(hit.textContent || ""));
        root.normalize();
      }

      function getHeroHtmlFromDom() {
        normalizeHeroDom();
        const el = document.getElementById("heroHeading");
        if (!el) return "";
        return el.innerHTML
          .replace(/<br\s*\/?>/gi, "<br>")
          .replace(/\s*<br>\s*/g, "<br>")
          .trim();
      }

      // ===== Slide adjust helpers =====
      function clampNum(n, min, max) {
        n = Number.isFinite(n) ? n : min;
        return Math.max(min, Math.min(max, n));
      }
      function applyAdjustToMedia(el, s) {
        const adj = (s && typeof s.adjust === "object") ? s.adjust : {};
        const fit = adj.fit === "contain" ? "contain" : "cover";
        const x = clampNum(parseFloat(adj.x ?? 50), 0, 100);
        const y = clampNum(parseFloat(adj.y ?? 50), 0, 100);
        const zoom = clampNum(parseFloat(adj.zoom ?? 1), 1, 2);

        if (!el) return;

        el.style.objectFit = fit;
        el.style.objectPosition = `${x}% ${y}%`;

        // Only images get zoom (video zoom is messy)
        if (el.tagName === "IMG") {
          el.style.transform = `translateX(0) scale(${zoom})`;
          el.style.transformOrigin = `${x}% ${y}%`;
        } else {
          // keep slider transform behavior for videos
          el.style.transformOrigin = `${x}% ${y}%`;
        }
      }

      // ===== Home content loading =====
      async function loadHomeContent() {
        try {
          const res = await fetch("/content/home.json", { cache: "no-store" });
          if (!res.ok) return;
          const data = await res.json();

          // Ticker
          const track = document.getElementById("tickerTrack");
          if (track && data.tickerText) {
            const t = String(data.tickerText);
            track.innerHTML = `
              <span class="ticker__item" id="tickerText">${t}</span>
              <span class="ticker__item" aria-hidden="true">${t}</span>
              <span class="ticker__item" aria-hidden="true">${t}</span>
            `;
          }

          // Hero text (heroHtml)
          const heading = document.getElementById("heroHeading");
          const sub = document.getElementById("heroSubtext");
          if (heading && data.heroHtml) {
            heading.innerHTML = String(data.heroHtml);
            normalizeHeroDom();
          }
          if (sub && data.subtext) sub.textContent = data.subtext;

          // Theme
          if (data.theme && typeof data.theme === "object") {
            if (heading && data.theme.headingColor) heading.style.color = data.theme.headingColor;
            if (sub && data.theme.subtextColor) sub.style.color = data.theme.subtextColor;

            const align = (data.theme.heroAlign === "center") ? "center" : "left";
            if (heading) heading.style.textAlign = align;
            if (sub) sub.style.textAlign = align;

            const heroLeft = document.querySelector(".hero-left");
            if (heroLeft && window.matchMedia("(max-width: 760px)").matches === false) {
              heroLeft.style.alignItems = (align === "center") ? "center" : "flex-start";
            }
          }

          // Slides from JSON
          const slidesWrap = document.getElementById("storySlides");
          const barsWrap = document.getElementById("storyBars");

          const rawSlides = Array.isArray(data.storySlides) ? data.storySlides : [];
          const slides = rawSlides.slice(0, MAX_SLIDES);
          window.__HOME_SLIDES__ = slides;

          if (slidesWrap && barsWrap && slides.length) {
            slidesWrap.innerHTML = "";
            barsWrap.innerHTML = "";

            slides.forEach((s, i) => {
              const bar = document.createElement("span");
              bar.className = "bar" + (i === 0 ? " is-active" : "");
              barsWrap.appendChild(bar);

              if (s.type === "video") {
                const v = document.createElement("video");
                v.className = "story-vid" + (i === 0 ? " is-active" : "");
                v.muted = true;
                v.playsInline = true;
                v.preload = "metadata";
                v.setAttribute("data-slide-index", String(i));

                // Apply fit/position (no zoom)
                applyAdjustToMedia(v, s);

                const src = document.createElement("source");
                src.src = s.src;
                src.type = "video/mp4";
                v.appendChild(src);

                slidesWrap.appendChild(v);
              } else {
                const img = document.createElement("img");
                img.className = "story-img" + (i === 0 ? " is-active" : "");
                img.src = s.src;
                img.alt = s.alt || `Story ${i + 1}`;
                img.setAttribute("data-slide-index", String(i));

                applyAdjustToMedia(img, s);

                slidesWrap.appendChild(img);
              }
            });

            updateOverlayCaptionForIndex(0);
          }
        } catch {
          // fallback
        }
      }

      function updateOverlayCaptionForIndex(i) {
        const overlayEl = document.getElementById("storyOverlay");
        const captionEl = document.getElementById("storyCaption");
        const slides = window.__HOME_SLIDES__ || [];

        const s = slides[i];
        if (!overlayEl || !captionEl || !s) {
          if (overlayEl) overlayEl.hidden = true;
          if (captionEl) captionEl.hidden = true;
          return;
        }

        const overlayEnabled = !(s.overlay && s.overlay.enabled === false);
        const opacity = (s.overlay && typeof s.overlay.opacity === "number") ? s.overlay.opacity : 0.45;

        if (overlayEnabled) {
          overlayEl.hidden = false;
          overlayEl.style.setProperty("--overlay-opacity", String(clampNum(opacity, 0, 0.85)));
        } else {
          overlayEl.hidden = true;
        }

        const cap = (s.caption || "").trim();
        if (cap) {
          captionEl.hidden = false;
          captionEl.textContent = cap;
        } else {
          captionEl.hidden = true;
          captionEl.textContent = "";
        }
      }

      // ===== Slider logic =====
      const storyEl = document.getElementById("story");
      const btnPrev = storyEl.querySelector(".story-zone.left");
      const btnNext = storyEl.querySelector(".story-zone.right");

      const DEFAULT_MS = 3500;
      const MAX_VIDEO_MS = 15000;

      let index = 0;
      let timer = null;

      const isVideo = (el) => el && el.tagName === "VIDEO";

      function setBarDuration(ms) { storyEl.style.setProperty("--story-duration", `${ms}ms`); }
      function clearTimer() { if (timer) clearTimeout(timer); timer = null; }
      function getSlidesNow() { return Array.from(storyEl.querySelectorAll(".story-img, .story-vid")); }

      function stopAllVideos() {
        getSlidesNow().forEach((el) => {
          if (!isVideo(el)) return;
          try { el.pause(); el.currentTime = 0; } catch {}
        });
      }

      function getDurationForSlide(el) {
        if (!isVideo(el)) return DEFAULT_MS;
        const d = el.duration;
        if (Number.isFinite(d) && d > 0) return Math.min(Math.round(d * 1000), MAX_VIDEO_MS);
        return DEFAULT_MS;
      }

      function renderBars(slidesCount) {
        const bars = Array.from(storyEl.querySelectorAll(".story-bars .bar"));
        bars.forEach((b, i) => {
          b.classList.remove("is-active", "is-filled");
          if (i < index) b.classList.add("is-filled");
          if (i === index) b.classList.add("is-active");
        });
      }

      async function activateVideo(el) {
        if (!isVideo(el)) return;

        if (!el.dataset.storyBound) {
          el.addEventListener("ended", () => showSlide(index + 1));
          el.dataset.storyBound = "1";
        }

        try { el.currentTime = 0; await el.play(); } catch {}
      }

      function restartTimerForActiveSlide() {
        clearTimer();
        const slidesNow = getSlidesNow();
        if (isAdmin) return;       // admin: no autoplay
        if (slidesNow.length <= 1) return;

        const active = slidesNow[index];
        const ms = getDurationForSlide(active);
        setBarDuration(ms);
        timer = setTimeout(() => showSlide(index + 1), ms);
      }

      function showSlide(nextIndex) {
        const slidesNow = getSlidesNow();
        if (slidesNow.length === 0) return;

        if (slidesNow.length === 1) {
          index = 0;
          slidesNow[0].classList.add("is-active");
          renderBars(1);
          updateOverlayCaptionForIndex(0);
          clearTimer();
          return;
        }

        if (nextIndex < 0) nextIndex = slidesNow.length - 1;
        if (nextIndex >= slidesNow.length) nextIndex = 0;

        clearTimer();

        const current = slidesNow[index];
        const next = slidesNow[nextIndex];

        stopAllVideos();

        if (current) {
          current.classList.remove("is-active");
          current.classList.add("is-exiting");
          setTimeout(() => current.classList.remove("is-exiting"), 700);
        }
        if (next) next.classList.add("is-active");

        index = nextIndex;
        renderBars(slidesNow.length);
        updateOverlayCaptionForIndex(index);

        activateVideo(next);
        restartTimerForActiveSlide();
      }

      // ===== Init =====
      loadHomeContent().finally(() => {
        const slidesNow = getSlidesNow();
        index = 0;

        slidesNow.forEach((s, i) => s.classList.toggle("is-active", i === 0));
        renderBars(slidesNow.length);
        updateOverlayCaptionForIndex(0);
        activateVideo(slidesNow[0]);
        restartTimerForActiveSlide();

        btnPrev?.addEventListener("click", (e) => { e.preventDefault(); showSlide(index - 1); });
        btnNext?.addEventListener("click", (e) => { e.preventDefault(); showSlide(index + 1); });

        storyEl.addEventListener("mouseenter", () => clearTimer());
        storyEl.addEventListener("mouseleave", () => restartTimerForActiveSlide());

        if (isAdmin) {
          // Disable navigation links only
          document.addEventListener("click", (e) => {
            const a = e.target && e.target.closest ? e.target.closest("a") : null;
            if (!a) return;
            e.preventDefault();
            e.stopPropagation();
          }, true);

          // Disable story zones so click selects instead of sliding
          storyEl.querySelectorAll(".story-zone").forEach((btn) => {
            btn.style.pointerEvents = "none";
          });

          // Bind selections (after content load)
          const ticker = document.getElementById("tickerText");
          const hero = document.getElementById("heroHeading");
          const sub = document.getElementById("heroSubtext");

          ticker?.addEventListener("click", (e) => {
            e.preventDefault(); e.stopPropagation();
            adminOutline(ticker);
            adminSend({ type: "select", page: "home", target: "tickerText" });
          });

          hero?.addEventListener("click", (e) => {
            e.preventDefault(); e.stopPropagation();
            adminOutline(hero);
            adminSend({ type: "select", page: "home", target: "heroHeading" });
          });

          sub?.addEventListener("click", (e) => {
            e.preventDefault(); e.stopPropagation();
            adminOutline(sub);
            adminSend({ type: "select", page: "home", target: "subtext" });
          });

          // Slide selection: click story selects current slide index
          storyEl.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            adminOutline(storyEl);
            adminSend({ type: "select", page: "home", target: "slide:" + index });
          });

          // Make hero editable
          if (hero) {
            hero.setAttribute("contenteditable", "true");
            hero.setAttribute("spellcheck", "false");

            // Enter inserts 1 <br>, then moves caret to 2nd line
            hero.addEventListener("keydown", (e) => {
              if (e.key !== "Enter") return;

              e.preventDefault();
              normalizeHeroDom();

              const br = hero.querySelector("br");
              if (!br) {
                document.execCommand("insertHTML", false, "<br>");
                return;
              }

              const sel = window.getSelection();
              if (!sel) return;
              const r = document.createRange();
              r.selectNodeContents(hero);
              r.collapse(false);
              sel.removeAllRanges();
              sel.addRange(r);
            });

            hero.addEventListener("input", () => {
              adminSend({ type: "homeHeroHtml", heroHtml: getHeroHtmlFromDom() });
            });
          }
        }
      });

      // Receive updates from admin builder
      window.addEventListener("message", (ev) => {
        if (ev.origin !== location.origin) return;
        const d = ev.data || {};
        if (!d.__adminBuilder) return;

        if (d.type === "apply" && d.page === "home") {
          const ticker = document.getElementById("tickerText");
          const sub = document.getElementById("heroSubtext");
          if (d.target === "tickerText" && ticker) ticker.textContent = d.value || "";
          if (d.target === "subtext" && sub) sub.textContent = d.value || "";
        }

        if (d.type === "applyStyle" && d.page === "home") {
          const hero = document.getElementById("heroHeading");
          const sub = document.getElementById("heroSubtext");
          const style = d.style || {};

          if (d.target === "heroHeading" && hero) {
            if (style.color != null) hero.style.color = style.color || "";
            if (style.align) hero.style.textAlign = style.align;
          }
          if (d.target === "subtext" && sub) {
            if (style.color != null) sub.style.color = style.color || "";
            if (style.align) sub.style.textAlign = style.align;
          }

          if (style.align && window.matchMedia("(max-width: 760px)").matches === false) {
            const heroLeft = document.querySelector(".hero-left");
            if (heroLeft) heroLeft.style.alignItems = (style.align === "center") ? "center" : "flex-start";
          }
        }

        if (d.type === "heroWordStyle" && d.page === "home") {
          const hero = document.getElementById("heroHeading");
          if (!hero) return;
          normalizeHeroDom();
          const range = findWordRangeAroundSelection(hero);
          if (!range) return;

          if (d.action === "italic") wrapRangeWithItalic(range);
          if (d.action === "normal") unwrapItalicAtRange(range);

          if (isAdmin) adminSend({ type: "homeHeroHtml", heroHtml: getHeroHtmlFromDom() });
        }

        // Dropdown selection from inspector: jump to a slide
        if (d.type === "selectSlide" && d.page === "home") {
          const nextIndex = Number(d.index || 0);
          showSlide(nextIndex);
          return;
        }

        if (d.type === "applySlide" && d.page === "home") {
          // For simplicity keep consistent: rerender via reload so bars/slides rebuild from JSON
          location.reload();
        }
        if (d.type === "rerenderSlides" && d.page === "home") {
          location.reload();
        }
        if (d.type === "clearHighlight") adminClearOutline();
      });
    </script>
  </body>
</html>
