<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Builder • Sync & Style</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,500;1,600;1,700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./admin.css" />
    <link rel="stylesheet" href="./inspector.css" />
  </head>

  <body>
    <div class="app">
      <aside class="sidebar" aria-label="Pages">
        <div class="brand">
          <div class="brand-mark">S</div>
          <div class="brand-text">
            <div class="brand-title">Sync & Style</div>
            <div class="brand-sub">Admin Builder</div>
          </div>
        </div>

        <nav class="nav">
          <button class="nav-item is-active" data-page="home" type="button">Home</button>
          <button class="nav-item" data-page="products" type="button">Products</button>
          <button class="nav-item" data-page="about" type="button">About</button>
          <button class="nav-item" data-page="contact" type="button">Contact</button>
        </nav>

        <div class="sidebar-footer">
          <div class="small muted" id="whoami">Locked</div>
          <button class="btn btn-ghost w-full" id="logoutBtn" type="button">Log out</button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="topbar-left">
            <div class="pill">
              <span class="dot" id="lockDot"></span>
              <span class="pill-text" id="lockText">Locked</span>
            </div>

            <div class="pill">
              <span class="pill-text">Preview:</span>
              <span class="pill-strong" id="currentPageLabel">Home</span>
            </div>
          </div>

          <div class="topbar-right">
            <span class="status" id="status"></span>
            <button class="btn btn-primary" id="saveBtn" type="button" disabled>Save</button>
          </div>
        </header>

        <section class="content">
          <div class="preview">
            <iframe id="previewFrame" title="Live preview" src="/index.html?admin=1"></iframe>
          </div>

          <aside class="inspector" aria-label="Inspector">
            <div class="inspector-head">
              <div>
                <div class="inspector-title" id="inspectorTitle">Inspector</div>
                <div class="inspector-sub" id="inspectorSub">Click an element in the preview to edit.</div>
              </div>
              <button class="icon-btn" id="closeInspectorBtn" type="button" title="Close">×</button>
            </div>

            <div class="inspector-body" id="inspectorBody">
              <!-- dynamic -->
              <div class="empty">
                <div class="empty-title">Nothing selected</div>
                <div class="empty-sub">Click a heading, text, or slide in the preview.</div>
              </div>
            </div>

            <div class="inspector-foot">
              <button class="btn btn-ghost" id="resetSelectionBtn" type="button">Reset selection</button>
              <button class="btn btn-ghost" id="reloadPreviewBtn" type="button">Reload preview</button>
            </div>
          </aside>
        </section>
      </main>
    </div>

    <!-- Auth modal -->
    <div class="modal" id="authModal" aria-hidden="true">
      <div class="modal-card">
        <h3>Enter admin password</h3>
        <p>Required to load and save site content.</p>

        <div class="field">
          <label>Password</label>
          <input id="passwordInput" type="password" placeholder="••••••••" />
        </div>

        <div class="row">
          <button class="btn btn-primary" id="loginBtn" type="button">Unlock</button>
          <button class="btn btn-ghost" id="cancelLoginBtn" type="button">Cancel</button>
        </div>

        <div class="status" id="authStatus"></div>
      </div>
    </div>

    <script src="./admin.js"></script>
  </body>
</html>
