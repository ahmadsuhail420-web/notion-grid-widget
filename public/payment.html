<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <h1>Select a Template</h1>
    <select id="templateSelect">
        <option value="template1">Template 1</option>
        <option value="template2">Template 2</option>
        <option value="template3">Template 3</option>
    </select>

    <h2>Amount: ₹<span id="amountDisplay">499</span></h2>
    <button id="payButton">Pay with Razorpay</button>

    <script>
        var options = {
            "key": "YOUR_RAZORPAY_KEY_HERE", // Enter the Key ID generated from the Razorpay Dashboard
            "amount": 49900, // Amount is in currency subunits. Hence 49900
            "currency": "INR",
            "name": "Your Company Name",
            "description": "Payment for selected template",
            "image": "https://example.com/your_logo",
            "handler": function (response){
                alert(response.razorpay_payment_id);
                // Call your backend to verify the payment here
            },
            "prefill": {
                "name": "",
                "email": "",
                "contact": ""
            },
            "theme": {
                "color": "#F37254"
            }
        };

        document.getElementById('payButton').onclick = function(e){
            var rzp1 = new Razorpay(options);
            rzp1.open();
            e.preventDefault();
        }
    </script>

</body>
</html>
