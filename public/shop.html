<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shop • Generic Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/store/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark">GS</span>
        <span class="brand-text">Generic Store</span>
      </a>

      <nav class="nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="shop.html" class="nav-link is-active">Shop</a>
        <a href="product.html?id=p001" class="nav-link">Product</a>
      </nav>

      <div class="header-actions">
        <label class="currency">
          <select id="currencySelect" aria-label="Currency">
            <option value="USD" selected>USD ($)</option>
            <option value="EUR">EUR (€)</option>
            <option value="GBP">GBP (£)</option>
            <option value="PKR">PKR (Rs)</option>
            <option value="INR">INR (₹)</option>
            <option value="AED">AED (د.إ)</option>
          </select>
        </label>

        <a class="cart-btn" href="cart.html" aria-label="Cart">
          <span class="cart-ico">🛒</span>
          <span class="cart-count" id="cartCount">0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="section-head row">
        <div>
          <h1>Shop</h1>
          <p class="muted">Browse all products.</p>
        </div>
      </div>

      <div class="shop-layout">
        <aside class="filters">
          <div class="filter-block">
            <div class="filter-title">Search</div>
            <input id="searchInput" class="input" type="search" placeholder="Search products..." />
          </div>

          <div class="filter-block">
            <div class="filter-title">Category</div>
            <div class="chips" id="categoryChips"></div>
          </div>

          <div class="filter-block">
            <div class="filter-title">Sort</div>
            <select id="sortSelect" class="input">
              <option value="featured">Featured</option>
              <option value="price-asc">Price: Low → High</option>
              <option value="price-desc">Price: High → Low</option>
              <option value="name-asc">Name: A → Z</option>
            </select>
          </div>

          <div class="filter-block">
            <button class="btn btn-ghost w-full" id="resetBtn" type="button">Reset</button>
          </div>
        </aside>

        <section>
          <div class="products" id="shopProducts"></div>
        </section>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>
        <div class="footer-brand">Generic Store</div>
        <div class="muted">© <span id="year"></span> Generic Store.</div>
      </div>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="cart.html">Cart</a>
      </div>
    </div>
  </footer>

  <script src="assets/store/products.js"></script>
  <script src="assets/store/app.js"></script>
</body>
</html>
